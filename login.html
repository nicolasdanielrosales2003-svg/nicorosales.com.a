<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Trabajadores</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Botón fijo arriba a la izquierda -->
  <form id="loginForm" style="position:fixed; top:20px; left:20px; background:#fff3cd; padding:15px; border-radius:8px;">
    <label>Usuario:</label><br>
    <input type="text" name="usuario" required><br><br>

    <label>Contraseña:</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">Login</button>
  </form>

  <p id="loginMensaje" style="margin-top:120px; text-align:center;"></p>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginMensaje = document.getElementById("loginMensaje");

    loginForm.addEventListener("submit", e => {
      e.preventDefault();
      const usuario = loginForm.usuario.value;
      const password = loginForm.password.value;

      if (usuario === "empleado" && password === "1234") {
        window.location.href = "pedidos.html";
      } else {
        loginMensaje.innerText = "❌ Usuario o contraseña incorrectos";
      }
    });
  </script>
</body>
</html>
</body>
</html>
